name: Playhead
options:
  bundleIdPrefix: com.playhead
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  Playhead:
    type: application
    platform: iOS
    sources:
      - path: Playhead
    resources:
      - path: Playhead/Resources
    settings:
      base:
        DEVELOPMENT_TEAM: 36Z6VYTT9X
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    # playhead-gtt9.21: stamp the short git SHA into a dedicated
    # `BuildProvenance.plist` in the app bundle so `BuildInfo.commitSHA`
    # (and downstream FrozenTrace provenance) reflects the binary's
    # commit. Falls back to "unknown" when run outside a git context
    # (CI w/o checkout, archive replays). See `BuildInfo.swift`.
    #
    # WHY a SEPARATE plist (not Info.plist):
    # `ProcessInfoPlistFile` runs DURING the Resources phase and
    # rewrites the deployed `Info.plist` from `${PRODUCT_SETTINGS_PATH}`
    # (the source-tree plist). Any earlier script-phase edits to
    # `${TARGET_BUILD_DIR}/${INFOPLIST_PATH}` get clobbered. Putting
    # the SHA in its own plist sidesteps that race entirely.
    #
    # WHY `postBuildScripts` (NOT `postCompileScripts`):
    # We must run AFTER Resources (so the bundle dir exists) but
    # BEFORE CodeSign (so the bundle's signature seals our plist
    # too). xcodegen's `postBuildScripts` lands in exactly that
    # window for an app target.
    postBuildScripts:
      - name: Stamp build commit SHA
        # Write a small `BuildProvenance.plist` into the built .app.
        # The source tree stays clean — only the build dir changes.
        script: |
          set -euo pipefail
          PROVENANCE_PLIST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/BuildProvenance.plist"
          SHA="$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo unknown)"
          if [ -z "$SHA" ]; then SHA="unknown"; fi
          # Skip rewrite when the existing plist already carries this SHA,
          # otherwise every build bumps the file mtime and CodeSign re-signs
          # the entire bundle for no reason.
          if [ -f "$PROVENANCE_PLIST" ]; then
            EXISTING="$(/usr/libexec/PlistBuddy -c 'Print :BuildCommitSHA' "$PROVENANCE_PLIST" 2>/dev/null || echo "")"
            if [ "$EXISTING" = "$SHA" ]; then
              echo "BuildCommitSHA unchanged ($SHA); skipping rewrite"
              exit 0
            fi
          fi
          /bin/cat > "$PROVENANCE_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>BuildCommitSHA</key>
              <string>$SHA</string>
          </dict>
          </plist>
          EOF
          echo "stamped BuildCommitSHA=$SHA into $PROVENANCE_PLIST"
    info:
      path: Playhead/Support/Info.plist
      properties:
        CFBundleDisplayName: Playhead
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSpeechRecognitionUsageDescription: Playhead uses on-device speech transcription to generate episode transcripts and ad-skip markers.
        UIBackgroundModes:
          - audio
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.playhead.app.analysis.backfill
          - com.playhead.app.analysis.continued
          - com.playhead.app.preanalysis.recovery
          - com.playhead.app.feed-refresh
        # playhead-m8v7: register the `playhead://` URL scheme for
        # transcript-share deep links. `CFBundleURLName` uses the
        # bundle id as a uniqueness key (Apple's documented
        # convention); the scheme itself is `playhead`.
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: com.playhead.app.deeplink
            CFBundleURLSchemes:
              - playhead
    scheme:
      testTargets:
        - name: PlayheadTests
          parallelizable: true
      testPlans:
        - path: TestPlans/PlayheadFastTests.xctestplan
          defaultPlan: true
        - path: TestPlans/PlayheadIntegrationTests.xctestplan
      storeKitConfiguration: Playhead/Resources/Playhead.storekit
  PlayheadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlayheadTests
        excludes:
          # Dated NARL FrozenTrace fixture subdirectories are read at
          # runtime via #filePath — they do not need to be bundled as
          # test resources, and bundling would cause "Multiple commands
          # produce ..." build errors because the same FrozenTrace-<id>.json
          # basename appears in both 2026-04-23/ and 2026-04-24/ (same
          # asset captured on both days). Exclude the dated dirs from
          # xcodegen; the baseline 2026-04-22/ set stays bundled for
          # the synthetic tests.
          - "Fixtures/NarlEval/2026-04-23/**"
          - "Fixtures/NarlEval/2026-04-23-1354/**"
          - "Fixtures/NarlEval/2026-04-24/**"
    dependencies:
      - target: Playhead
    settings:
      base:
        DEVELOPMENT_TEAM: 36Z6VYTT9X
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Playhead.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Playhead"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  # bd-1my: real-device-only smoke scheme that runs the live FM stack
  # against the Conan "Fanhausen Revisited" fixture and the synthetic
  # boundary-expansion controls. Gated on PLAYHEAD_FM_SMOKE=1 so the
  # tests early-exit when invoked from any other scheme.
  PlayheadFMSmoke:
    build:
      targets:
        Playhead: [test]
        PlayheadTests: [test]
    test:
      config: Debug
      targets:
        - name: PlayheadTests
          selectedTests:
            - PlayheadFMSmokeTests
      environmentVariables:
        - variable: PLAYHEAD_FM_SMOKE
          value: "1"
          isEnabled: true
        # Cycle 2 Rev4-L4: PLAYHEAD_FM_REDACT removed. C1 wires the
        # PromptRedactor unconditionally through PlayheadRuntime, so
        # the env var is moot — production now always loads the
        # bundled RedactionRules.json or fails loud at startup.
