name: Playhead
options:
  bundleIdPrefix: com.playhead
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  Playhead:
    type: application
    platform: iOS
    sources:
      - path: Playhead
    resources:
      - path: Playhead/Resources
    settings:
      base:
        DEVELOPMENT_TEAM: 36Z6VYTT9X
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: Playhead/Support/Info.plist
      properties:
        CFBundleDisplayName: Playhead
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSpeechRecognitionUsageDescription: Playhead uses on-device speech transcription to generate episode transcripts and ad-skip markers.
        UIBackgroundModes:
          - audio
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.playhead.app.analysis.backfill
          - com.playhead.app.analysis.continued
          - com.playhead.app.preanalysis.recovery
    scheme:
      testTargets:
        - name: PlayheadTests
          parallelizable: true
      storeKitConfiguration: Playhead/Resources/Playhead.storekit
  PlayheadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlayheadTests
    dependencies:
      - target: Playhead
    settings:
      base:
        DEVELOPMENT_TEAM: 36Z6VYTT9X
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Playhead.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Playhead"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  # bd-1my: real-device-only smoke scheme that runs the live FM stack
  # against the Conan "Fanhausen Revisited" fixture and the synthetic
  # boundary-expansion controls. Gated on PLAYHEAD_FM_SMOKE=1 so the
  # tests early-exit when invoked from any other scheme.
  PlayheadFMSmoke:
    build:
      targets:
        Playhead: [test]
        PlayheadTests: [test]
    test:
      config: Debug
      targets:
        - name: PlayheadTests
          selectedTests:
            - PlayheadFMSmokeTests
      environmentVariables:
        - variable: PLAYHEAD_FM_SMOKE
          value: "1"
          isEnabled: true
        # Cycle 2 Rev4-L4: PLAYHEAD_FM_REDACT removed. C1 wires the
        # PromptRedactor unconditionally through PlayheadRuntime, so
        # the env var is moot — production now always loads the
        # bundled RedactionRules.json or fails loud at startup.
