name: Playhead
options:
  bundleIdPrefix: com.playhead
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  Playhead:
    type: application
    platform: iOS
    sources:
      - path: Playhead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: Playhead/Support/Info.plist
      properties:
        CFBundleDisplayName: Playhead
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.playhead.app.analysis.backfill
          - com.playhead.app.analysis.continued
    scheme:
      testTargets:
        - PlayheadTests
      storeKitConfiguration: Playhead/Resources/Playhead.storekit
  PlayheadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlayheadTests
    dependencies:
      - target: Playhead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Playhead.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Playhead"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
