name: Playhead
options:
  bundleIdPrefix: com.playhead
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  Playhead:
    type: application
    platform: iOS
    sources:
      - path: Playhead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.app
        INFOPLIST_KEY_CFBundleDisplayName: Playhead
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets:
        - PlayheadTests
      storeKitConfiguration: Playhead/Resources/Playhead.storekit
  PlayheadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlayheadTests
    dependencies:
      - target: Playhead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playhead.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Playhead.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Playhead"
        BUNDLE_LOADER: "$(TEST_HOST)"
