name: TestFlight Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.beads/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional What to Test notes for this build
        required: false
        type: string

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_FILE: Playhead.xcodeproj
  PROJECT_SPEC: project.yml
  INFO_PLIST: Playhead/Support/Info.plist
  SCHEME: Playhead
  APP_BUNDLE_ID: com.playhead.app
  APP_STORE_PROFILE_NAME: Playhead App Store
  APPLE_TEAM_ID: 36Z6VYTT9X
  ARCHIVE_PATH: ${{ github.workspace }}/build/Playhead.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/export
  IPA_PATH: ${{ github.workspace }}/build/export/Playhead.ipa

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec "$PROJECT_SPEC"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          rm -rf TestResults.xcresult
          xcodebuild test \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -resultBundlePath TestResults.xcresult

      - name: Upload test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xcresult
          path: TestResults.xcresult
          retention-days: 14
          if-no-files-found: warn

  deploy:
    needs: test
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec "$PROJECT_SPEC"

      - name: Stamp unique build number
        shell: bash
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$INFO_PLIST"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

      - name: Download App Store provisioning profile
        id: provisioning_profiles
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: ${{ env.APP_BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Select App Store provisioning profile
        id: selected_profile
        shell: bash
        env:
          EXPECTED_PROFILE_NAME: ${{ env.APP_STORE_PROFILE_NAME }}
          PROFILES_JSON: ${{ steps.provisioning_profiles.outputs.profiles }}
        run: |
          set -euo pipefail
          profiles_file="$(mktemp)"
          printf '%s' "$PROFILES_JSON" > "$profiles_file"

          selected_name="$(jq -r --arg name "$EXPECTED_PROFILE_NAME" '.[] | select(.name == $name) | .name' "$profiles_file" | head -n 1)"
          selected_uuid="$(jq -r --arg name "$EXPECTED_PROFILE_NAME" '.[] | select(.name == $name) | .udid' "$profiles_file" | head -n 1)"

          if [[ -z "$selected_name" || -z "$selected_uuid" ]]; then
            echo "Expected provisioning profile '$EXPECTED_PROFILE_NAME' was not found." >&2
            echo "Available profiles:" >&2
            jq -r '.[].name' "$profiles_file" >&2
            exit 1
          fi

          echo "name=$selected_name" >> "$GITHUB_OUTPUT"
          echo "uuid=$selected_uuid" >> "$GITHUB_OUTPUT"

      - name: Create export options plist
        shell: bash
        env:
          PROFILE_NAME: ${{ steps.selected_profile.outputs.name }}
        run: |
          set -euo pipefail
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Archive app
        shell: bash
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          PROFILE_NAME: ${{ steps.selected_profile.outputs.name }}
          PROFILE_UUID: ${{ steps.selected_profile.outputs.uuid }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playhead-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: ignore

      - name: Upload to TestFlight
        shell: bash
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          key_dir="$HOME/.appstoreconnect/private_keys"
          key_path="$key_dir/AuthKey_${APPSTORE_KEY_ID}.p8"
          mkdir -p "$key_dir"
          trap 'rm -f "$key_path"' EXIT
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"

          xcrun altool \
            --output-format xml \
            --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
