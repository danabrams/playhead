name: iOS CI

on:
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_FILE: Playhead.xcodeproj
  PROJECT_SPEC: project.yml
  SCHEME: Playhead
  DERIVED_DATA_PATH: .deriveddata-ci
  DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro,OS=latest

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec "$PROJECT_SPEC"

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO

      # PlayheadFastTests is a 6k+ simulator suite that can consume a
      # large fraction of the monthly Actions budget while still being
      # sensitive to runner load. Keep CI build-only; run tests locally
      # when working the iOS suite.
      - name: Upload Xcode build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: |
            .deriveddata-ci/Logs/Build/*.xcactivitylog
          if-no-files-found: ignore
